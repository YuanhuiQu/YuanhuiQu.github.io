<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Personal website of Yuanhui Qu">
  <title>Yuanhui(Jason) Qu</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --ink: #16243a;
      --muted: #5f6b7a;
      --surface: #ffffff;
      --accent: #0b63f6;
      --accent-2: #13a89e;
      --border: #d7deea;
      --shadow: #0c1b3320;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 8%, #d6ebff 0%, transparent 30%),
        radial-gradient(circle at 88% 10%, #e8fff8 0%, transparent 26%),
        linear-gradient(160deg, #f8fafc 0%, #f4f7fd 55%, #eef3ff 100%),
        var(--bg);
      line-height: 1.55;
    }

    .container {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 2.2rem 0 4rem;
    }

    .hero {
      background:
        linear-gradient(120deg, #ffffffcc, #ffffffee),
        radial-gradient(circle at right top, #dbe9ff 0%, transparent 30%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.1rem;
      box-shadow: 0 14px 34px var(--shadow);
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0.35rem 0 0.6rem;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.08;
      letter-spacing: -0.01em;
    }

    .lead {
      margin: 0;
      max-width: 60ch;
      font-size: 1.05rem;
      color: #2d3b52;
    }

    .cta-row {
      margin-top: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid #b8c8e6;
      color: #1b2d49;
      border-radius: 999px;
      padding: 0.52rem 0.98rem;
      font-weight: 600;
      font-size: 0.95rem;
      background: #ffffffb8;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px #355d9a1e;
    }

    .btn.primary {
      background: linear-gradient(120deg, var(--accent), #2a88ff);
      border-color: transparent;
      color: #fff;
    }

    .grid {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1rem;
    }

    .card {
      grid-column: span 12;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.3rem 1.2rem;
      box-shadow: 0 8px 20px #1b2d4908;
    }

    .card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
    }

    .muted {
      color: var(--muted);
    }

    ul {
      margin: 0.6rem 0 0;
      padding-left: 1.15rem;
    }

    li + li {
      margin-top: 0.45rem;
    }

    .project-title {
      font-weight: 700;
      color: #0d4fc8;
    }

    footer {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    a {
      color: var(--accent);
      text-underline-offset: 2px;
    }

    @media (min-width: 760px) {
      .about {
        grid-column: span 5;
      }

      .projects {
        grid-column: span 7;
      }

      .contact {
        grid-column: span 12;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <p class="eyebrow">Personal Site</p>
      <h1>Yuanhui Qu</h1>
      <p class="lead">
        I build software and data-driven products.
        This page is hosted on GitHub Pages at <strong>yuanhuiqu.me</strong>.
      </p>
      <div class="cta-row">
        <a class="btn" href="https://github.com/YuanhuiQu">GitHub</a>
        <a class="btn" href="https://www.linkedin.com/in/yuanhui-qu/">LinkedIn</a>
      </div>
    </header>


    <footer>
      <p>© <span id="year"></span> Yuanhui Qu</p>
    </footer>
  </div>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
